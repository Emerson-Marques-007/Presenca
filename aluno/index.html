<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4F46E5">
  <title>Presença Digital — Minha Presença</title>
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Loading -->
  <div class="loading-overlay" id="loading-initial">
    <div class="spinner"></div>
    <p class="text-secondary">Carregando...</p>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Presença Digital
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" onclick="Utils.toggleTheme()" title="Alternar tema"></button>
        <div class="navbar-user">
          <span class="hidden-mobile" id="user-name"></span>
          <div class="navbar-avatar" id="user-avatar"></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()" title="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Conteúdo Principal -->
  <main class="page">
    <div class="container">
      <!-- Header -->
      <div class="page-header">
        <h1 class="page-title" id="greeting">Olá!</h1>
        <p class="page-subtitle" id="date-info"></p>
      </div>

      <!-- Estatísticas rápidas -->
      <div class="grid grid-3 gap-2 mb-3" id="stats-cards">
        <div class="card stat-card">
          <div class="stat-value status-presente" id="stat-presencas">--</div>
          <div class="stat-label">Presenças</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value status-atrasado" id="stat-atrasos">--</div>
          <div class="stat-label">Atrasos</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value status-ausente" id="stat-faltas">--</div>
          <div class="stat-label">Faltas</div>
        </div>
      </div>

      <!-- Aulas de Hoje -->
      <div class="card mb-3">
        <div class="card-header">
          <h3>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:0.25rem;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Aulas de Hoje
          </h3>
          <span class="badge badge-info" id="dia-semana"></span>
        </div>

        <div id="aulas-hoje">
          <div class="empty-state">
            <div class="spinner"></div>
            <p class="mt-2">Buscando suas aulas...</p>
          </div>
        </div>
      </div>

      <!-- Navegação rápida -->
      <div class="grid grid-2 gap-2">
        <a href="historico.html" class="card" style="text-decoration:none;text-align:center;padding:1.5rem;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" style="margin:0 auto 0.5rem;">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <h4>Histórico</h4>
          <p class="text-sm text-secondary">Ver todas as presenças</p>
        </a>
        <button class="card" style="text-align:center;padding:1.5rem;border:none;cursor:pointer;" onclick="abrirScanner()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" style="margin:0 auto 0.5rem;">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          <h4>Escanear QR</h4>
          <p class="text-sm text-secondary">Marcar via QR Code</p>
        </button>
      </div>
    </div>
  </main>

  <!-- Tela de confirmação de presença -->
  <div id="presenca-success" class="hidden" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;">
    <div class="check-animation">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 id="success-title">Presença Registrada!</h2>
    <p class="text-secondary" id="success-detail"></p>
    <button class="btn btn-primary mt-2" onclick="fecharSucesso()">OK</button>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    let perfil = null;

    async function init() {
      const autorizado = await Auth.requireRole('aluno');
      if (!autorizado) return;

      perfil = await Auth.getPerfil();

      // Atualizar UI com dados do usuário
      document.getElementById('user-name').textContent = perfil.nome.split(' ')[0];
      document.getElementById('user-avatar').textContent = Utils.getIniciais(perfil.nome);
      document.getElementById('greeting').textContent = `Olá, ${perfil.nome.split(' ')[0]}! 👋`;

      const hoje = new Date();
      document.getElementById('date-info').textContent =
        hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('dia-semana').textContent = Utils.getDiaSemanaLabel(hoje.getDay());

      // Esconder loading
      document.getElementById('loading-initial').style.display = 'none';

      // Carregar dados
      await Promise.all([carregarAulasHoje(), carregarEstatisticas()]);

      // Verificar se veio via QR code
      const qrToken = sessionStorage.getItem('qr_token');
      if (qrToken) {
        sessionStorage.removeItem('qr_token');
        window.location.href = `../presenca.html?token=${qrToken}`;
      }
    }

    async function carregarAulasHoje() {
      const container = document.getElementById('aulas-hoje');

      try {
        const { data: aulas, error } = await supabaseClient
          .rpc('turmas_do_aluno_hoje', { p_aluno_id: perfil.id });

        if (error) throw error;

        if (!aulas || aulas.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <p>Nenhuma aula programada para hoje.</p>
              <p class="text-sm mt-1">Aproveite o dia livre! 🎉</p>
            </div>
          `;
          return;
        }

        container.innerHTML = aulas.map(aula => {
          const horaAtual = Utils.currentTime();
          const emAndamento = horaAtual >= aula.hora_inicio && horaAtual <= aula.hora_fim;
          const jaPassou = horaAtual > aula.hora_fim;

          let statusBadge = '';
          let actionBtn = '';

          if (aula.ja_marcou) {
            statusBadge = '<span class="badge badge-success">✓ Registrada</span>';
          } else if (jaPassou) {
            statusBadge = '<span class="badge badge-danger">Encerrada</span>';
          } else if (emAndamento) {
            statusBadge = '<span class="badge badge-warning">Em andamento</span>';
            actionBtn = `<button class="btn btn-success btn-sm mt-1" onclick="marcarPresencaManual('${aula.turma_id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              Marcar Presença
            </button>`;
          } else {
            statusBadge = '<span class="badge badge-info">Aguardando</span>';
          }

          return `
            <div class="presenca-card ${aula.ja_marcou ? 'checked' : ''}" style="margin-bottom:0.75rem;">
              <div style="flex:1;">
                <div class="flex items-center gap-1" style="margin-bottom:0.25rem;">
                  <strong>${Utils.escapeHtml(aula.disciplina_nome)}</strong>
                  ${statusBadge}
                </div>
                <p class="text-sm text-secondary">
                  🕐 ${Utils.formatTime(aula.hora_inicio)} - ${Utils.formatTime(aula.hora_fim)}
                  ${aula.sala ? ` · 📍 ${Utils.escapeHtml(aula.sala)}` : ''}
                </p>
                <p class="text-sm text-muted">${Utils.escapeHtml(aula.nome_turma)}</p>
                ${actionBtn}
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="text-danger text-center">Erro ao carregar aulas.</p>`;
      }
    }

    async function carregarEstatisticas() {
      try {
        const { data, error } = await supabaseClient
          .from('presencas')
          .select('status')
          .eq('aluno_id', perfil.id);

        if (error) throw error;

        const stats = { presente: 0, atrasado: 0, ausente: 0 };
        (data || []).forEach(p => { stats[p.status] = (stats[p.status] || 0) + 1; });

        document.getElementById('stat-presencas').textContent = stats.presente;
        document.getElementById('stat-atrasos').textContent = stats.atrasado;
        document.getElementById('stat-faltas').textContent = stats.ausente;
      } catch (err) {
        console.error('Erro ao carregar estatísticas:', err);
      }
    }

    // --- Marcar presença manualmente (com validação de GPS) ---
    async function marcarPresencaManual(turmaId) {
      Utils.showLoading('Obtendo sua localização...');

      try {
        // 1. Obter localização do aluno
        const loc = await Utils.obterLocalizacao();

        // 2. Buscar dados da turma
        const { data: turma, error } = await supabaseClient
          .from('turmas')
          .select('*, disciplinas(nome)')
          .eq('id', turmaId)
          .single();

        if (error || !turma) throw new Error('Turma não encontrada.');

        // 3. Validar geolocalização
        if (turma.latitude && turma.longitude) {
          const validacao = Utils.validarLocalizacao(
            loc.latitude, loc.longitude,
            turma.latitude, turma.longitude,
            turma.raio_metros || CONFIG.RAIO_PADRAO_METROS
          );

          if (!validacao.dentroDoRaio) {
            Utils.hideLoading();
            Utils.showToast(
              `Você está a ${validacao.distancia}m da sala. Aproxime-se para marcar presença (máx: ${turma.raio_metros || CONFIG.RAIO_PADRAO_METROS}m).`,
              'error', 6000
            );
            return;
          }
        }

        // 4. Verificar se já marcou hoje
        const { data: existente } = await supabaseClient
          .from('presencas')
          .select('id')
          .eq('aluno_id', perfil.id)
          .eq('turma_id', turmaId)
          .eq('data', Utils.today())
          .single();

        if (existente) {
          Utils.hideLoading();
          Utils.showToast('Você já marcou presença nesta aula hoje.', 'warning');
          return;
        }

        // 5. Calcular status
        const horaRegistro = Utils.currentTime();
        const statusCalc = Utils.calcularStatusPresenca(turma.hora_inicio, horaRegistro);
        const distancia = turma.latitude ?
          Utils.calcularDistancia(loc.latitude, loc.longitude, turma.latitude, turma.longitude) : null;

        // 6. Registrar presença
        const { error: insertError } = await supabaseClient
          .from('presencas')
          .insert({
            aluno_id: perfil.id,
            turma_id: turmaId,
            data: Utils.today(),
            hora_registro: new Date().toISOString(),
            status: statusCalc.status,
            minutos_atraso: statusCalc.minutos_atraso,
            latitude_aluno: loc.latitude,
            longitude_aluno: loc.longitude,
            distancia_metros: distancia ? Math.round(distancia) : null,
            metodo: 'manual'
          });

        if (insertError) throw insertError;

        Utils.hideLoading();
        mostrarSucesso(statusCalc, turma.disciplinas?.nome || turma.nome_turma);
        await carregarAulasHoje();
        await carregarEstatisticas();

      } catch (err) {
        Utils.hideLoading();
        Utils.showToast(err.message || 'Erro ao marcar presença.', 'error');
        console.error(err);
      }
    }

    function mostrarSucesso(statusCalc, disciplina) {
      const el = document.getElementById('presenca-success');
      el.classList.remove('hidden');
      el.style.display = 'flex';

      const title = statusCalc.status === 'presente'
        ? '✅ Presença Registrada!'
        : `⚠️ Presença com Atraso`;

      const detail = statusCalc.status === 'presente'
        ? `Sua presença em ${disciplina} foi registrada com sucesso.`
        : `Você chegou ${statusCalc.minutos_atraso} minutos atrasado em ${disciplina}.`;

      document.getElementById('success-title').textContent = title;
      document.getElementById('success-detail').textContent = detail;
    }

    function fecharSucesso() {
      const el = document.getElementById('presenca-success');
      el.classList.add('hidden');
      el.style.display = 'none';
    }

    // --- Scanner QR Code (usando câmera) ---
    function abrirScanner() {
      const bodyHtml = `
        <div id="qr-reader" style="width:100%;"></div>
        <p class="text-sm text-center text-secondary mt-2">Aponte a câmera para o QR Code na sala de aula</p>
      `;
      Utils.showModal('Escanear QR Code', bodyHtml);

      setTimeout(() => {
        const html5QrcodeScanner = new Html5Qrcode("qr-reader");
        html5QrcodeScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            html5QrcodeScanner.stop();
            Utils.closeModal();
            // Extrair token da URL
            try {
              const url = new URL(decodedText);
              const token = url.searchParams.get('token');
              if (token) {
                window.location.href = `../presenca.html?token=${token}`;
              } else {
                Utils.showToast('QR Code inválido.', 'error');
              }
            } catch {
              Utils.showToast('QR Code inválido.', 'error');
            }
          },
          (errorMessage) => {
            // Ignorar erros de leitura contínua
          }
        ).catch(err => {
          console.error('Erro ao iniciar scanner:', err);
          Utils.closeModal();
          Utils.showToast('Não foi possível acessar a câmera. Verifique as permissões.', 'error');
        });
      }, 300);
    }

    init();
  </script>
</body>
</html>
