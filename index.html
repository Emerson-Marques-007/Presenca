<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Presença Digital - Marque sua presença de forma rápida e segura">
  <meta name="theme-color" content="#4F46E5">
  <title>Presença Digital — Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
  <!-- Loading inicial -->
  <div class="loading-overlay" id="loading-initial">
    <div class="spinner"></div>
    <p class="text-secondary">Carregando...</p>
  </div>

  <div class="auth-page" id="auth-page" style="display:none;">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h1>Presença Digital</h1>
        <p class="text-secondary text-sm">Registre sua presença de forma rápida e segura</p>
      </div>

      <!-- Tabs Login / Cadastro -->
      <div class="tabs" style="justify-content:center;">
        <button class="tab active" onclick="showTab('login')" id="tab-login">Entrar</button>
        <button class="tab" onclick="showTab('cadastro')" id="tab-cadastro">Cadastrar</button>
      </div>

      <!-- Formulário Login -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-matricula">Matrícula</label>
          <input class="form-input" type="text" id="login-matricula" placeholder="Digite sua matrícula" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-senha">Senha</label>
          <input class="form-input" type="password" id="login-senha" placeholder="Digite sua senha" required minlength="6" autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2" id="btn-login">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Entrar
        </button>
      </form>

      <!-- Formulário Cadastro -->
      <form id="form-cadastro" class="hidden" onsubmit="handleCadastro(event)">
        <div class="form-group">
          <label class="form-label" for="cad-nome">Nome Completo</label>
          <input class="form-input" type="text" id="cad-nome" placeholder="Seu nome completo" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="cad-matricula">Matrícula</label>
          <input class="form-input" type="text" id="cad-matricula" placeholder="Sua matrícula" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="cad-email">Email</label>
          <input class="form-input" type="email" id="cad-email" placeholder="seu.email@exemplo.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="cad-senha">Senha</label>
          <input class="form-input" type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-label" for="cad-senha2">Confirmar Senha</label>
          <input class="form-input" type="password" id="cad-senha2" placeholder="Repita a senha" required minlength="6" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2" id="btn-cadastro">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Criar Conta
        </button>
      </form>

      <div class="auth-divider">ou</div>

      <p class="text-center text-sm text-secondary">
        Escaneie o QR Code na sala de aula para marcar presença automaticamente
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // --- Verificar se já está logado ---
    async function init() {
      try {
        const session = await Auth.getSession();
        if (session) {
          const perfil = await Auth.getPerfil();
          if (perfil) {
            if (perfil.role === 'professor') {
              Utils.redirect('professor/index.html');
            } else {
              Utils.redirect('aluno/index.html');
            }
            return;
          }
        }
      } catch (e) {
        console.error(e);
      }
      // Mostrar página de auth
      document.getElementById('loading-initial').style.display = 'none';
      document.getElementById('auth-page').style.display = '';
    }

    init();

    // --- Tabs ---
    function showTab(tab) {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-cadastro').classList.toggle('hidden', tab !== 'cadastro');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-cadastro').classList.toggle('active', tab === 'cadastro');
    }

    // --- Login ---
    async function handleLogin(e) {
      e.preventDefault();
      const matricula = document.getElementById('login-matricula').value.trim();
      const senha = document.getElementById('login-senha').value;
      const btn = document.getElementById('btn-login');

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm"></div> Entrando...';

      const result = await Auth.loginPorMatricula(matricula, senha);

      if (result.success) {
        Utils.showToast('Login realizado com sucesso!', 'success');
        const perfil = await Auth.getPerfil();
        setTimeout(() => {
          if (perfil && perfil.role === 'professor') {
            Utils.redirect('professor/index.html');
          } else {
            Utils.redirect('aluno/index.html');
          }
        }, 500);
      } else {
        Utils.showToast(result.error, 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar`;
      }
    }

    // --- Cadastro ---
    async function handleCadastro(e) {
      e.preventDefault();
      const nome = document.getElementById('cad-nome').value.trim();
      const matricula = document.getElementById('cad-matricula').value.trim();
      const email = document.getElementById('cad-email').value.trim();
      const senha = document.getElementById('cad-senha').value;
      const senha2 = document.getElementById('cad-senha2').value;
      const btn = document.getElementById('btn-cadastro');

      if (senha !== senha2) {
        Utils.showToast('As senhas não coincidem.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm"></div> Cadastrando...';

      const result = await Auth.cadastrar(email, senha, nome, matricula, 'aluno');

      if (result.success) {
        Utils.showToast('Cadastro realizado! Fazendo login...', 'success');
        // Auto-login após cadastro
        const loginResult = await Auth.login(email, senha);
        if (loginResult.success) {
          setTimeout(() => Utils.redirect('aluno/index.html'), 500);
        } else {
          Utils.showToast('Cadastro feito! Faça login manualmente.', 'info');
          showTab('login');
        }
      } else {
        Utils.showToast(result.error, 'error');
      }

      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg> Criar Conta`;
    }

    // Verificar se chegou via QR code (token na URL)
    const qrToken = Utils.getQueryParam('token');
    if (qrToken) {
      // Guardar token para uso após login
      sessionStorage.setItem('qr_token', qrToken);
    }

    // Registrar Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW:', err));
    }
  </script>
</body>
</html>
